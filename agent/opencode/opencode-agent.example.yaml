schema_version: 1

context:
  project_dir: /absolute/path/to/source
  work_dir: /absolute/path/to/writable-work
  workspace_dir: /absolute/path/to/opencode-workspace

serve:
  tool: opencode
  executable: opencode
  port: 4096
  timeout: 1200
  max_retries: 2
  # 模型服务需要代理时在这里显式提供；按实际环境同时设置大小写变量。
  # environment:
  #   HTTP_PROXY: http://127.0.0.1:7890
  #   HTTPS_PROXY: http://127.0.0.1:7890
  #   http_proxy: http://127.0.0.1:7890
  #   https_proxy: http://127.0.0.1:7890
  #   NO_PROXY: 127.0.0.1,localhost
  #   no_proxy: 127.0.0.1,localhost
  environment: {}
  opencode_config: {}

model_pool:
  global_concurrency: 1
  models:
    - id: deepseek/deepseek-v4-pro
      model: deepseek/deepseek-v4-pro
      capability: high
      weight: 1
      max_concurrency: 1
      enabled: true

    - capability: high
      enabled: true
      id: deepseek/deepseek-v4-flash
      max_concurrency: 1
      model: deepseek/deepseek-v4-flash
      weight: 1
