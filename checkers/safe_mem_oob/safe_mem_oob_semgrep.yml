rules:
  - id: c-cpp.safe-mem.member-non-member-size
    languages: [c, cpp]
    severity: ERROR
    message: >
      Function=`$FUNC`. Safe memory call `$CALL` writes to member target but dstsz is not the member itself.
      The real writable region is likely the field, not the parent object or an unrelated size expression.
    metadata:
      category: security
      cwe:
        - "CWE-787: Out-of-bounds Write"
      risk_class: "B: member target with non-member dstsz"
    patterns:
      - pattern-either:
          - pattern-inside: |
              $RET $FUNC(...) {
                ...
              }
          - pattern-inside: |
              $RET $QUAL::$FUNC(...) {
                ...
              }
      - pattern-either:
          - pattern: $CALL($OBJ.$FIELD, $DSTSZ, $ARG3, $COUNT)
          - pattern: $CALL(&$OBJ.$FIELD, $DSTSZ, $ARG3, $COUNT)
          - pattern: $CALL($P->$FIELD, $DSTSZ, $ARG3, $COUNT)
          - pattern: $CALL(&$P->$FIELD, $DSTSZ, $ARG3, $COUNT)
          - pattern: $CALL($OBJ.$FIELD, $DSTSZ, $ARG3)
          - pattern: $CALL(&$OBJ.$FIELD, $DSTSZ, $ARG3)
          - pattern: $CALL($P->$FIELD, $DSTSZ, $ARG3)
          - pattern: $CALL(&$P->$FIELD, $DSTSZ, $ARG3)
          - pattern: $CALL($OBJ.$FIELD, $DSTSZ, ...)
          - pattern: $CALL(&$OBJ.$FIELD, $DSTSZ, ...)
          - pattern: $CALL($P->$FIELD, $DSTSZ, ...)
          - pattern: $CALL(&$P->$FIELD, $DSTSZ, ...)
      - pattern-not: $CALL($OBJ.$FIELD, sizeof($OBJ.$FIELD), $ARG3, $COUNT)
      - pattern-not: $CALL(&$OBJ.$FIELD, sizeof($OBJ.$FIELD), $ARG3, $COUNT)
      - pattern-not: $CALL($P->$FIELD, sizeof($P->$FIELD), $ARG3, $COUNT)
      - pattern-not: $CALL(&$P->$FIELD, sizeof($P->$FIELD), $ARG3, $COUNT)
      - pattern-not: $CALL($OBJ.$FIELD, sizeof($OBJ.$FIELD), $ARG3)
      - pattern-not: $CALL(&$OBJ.$FIELD, sizeof($OBJ.$FIELD), $ARG3)
      - pattern-not: $CALL($P->$FIELD, sizeof($P->$FIELD), $ARG3)
      - pattern-not: $CALL(&$P->$FIELD, sizeof($P->$FIELD), $ARG3)
      - pattern-not: $CALL($OBJ.$FIELD, sizeof($OBJ.$FIELD), ...)
      - pattern-not: $CALL(&$OBJ.$FIELD, sizeof($OBJ.$FIELD), ...)
      - pattern-not: $CALL($P->$FIELD, sizeof($P->$FIELD), ...)
      - pattern-not: $CALL(&$P->$FIELD, sizeof($P->$FIELD), ...)
      - metavariable-regex:
          metavariable: $CALL
          regex: '^(memcpy_s|memmove_s|memset_s|memcpy_sp|memcpy_safe|VOS_memcpy_safe|VOS_MemCpy_S|VOS_Mem_Copy_Safe|VOS_MemCpy_Safe|strcpy_s|strcat_s|wcscpy_s|wcscat_s|strncpy_s|strncat_s|wcsncpy_s|wcsncat_s|strcpy_safe|strcat_safe|strncpy_safe|strncat_safe|VOS_StrCpy_S|VOS_StrCat_S|VOS_StrNCpy_S|VOS_StrNCat_S|VOS_StrCpy_Safe|VOS_StrCat_Safe|VOS_StrNCpy_Safe|VOS_StrNCat_Safe|sprintf_s|snprintf_s|vsprintf_s|vsnprintf_s)$'

  - id: c-cpp.safe-mem.offset-full-size
    languages: [c, cpp]
    severity: ERROR
    message: >
      Function=`$FUNC`. Safe memory call `$CALL` writes to an offset destination while dstsz still uses the full object size.
      The real remaining space is reduced by the offset or index.
    metadata:
      category: security
      cwe:
        - "CWE-787: Out-of-bounds Write"
      risk_class: "B: offset destination with full dstsz"
    patterns:
      - pattern-either:
          - pattern-inside: |
              $RET $FUNC(...) {
                ...
              }
          - pattern-inside: |
              $RET $QUAL::$FUNC(...) {
                ...
              }
      - pattern-either:
          - pattern: $CALL($BUF + $OFF, sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL($BUF - $OFF, sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL(($BUF + $OFF), sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL(($BUF - $OFF), sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL(&$BUF[$IDX], sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL((&$BUF[$IDX]), sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL(($CAST *)$BUF + $OFF, sizeof($TYPE), $ARG3, $COUNT)
          - pattern: $CALL((char *)$BUF + $OFF, sizeof($TYPE), $ARG3, $COUNT)
          - pattern: $CALL((unsigned char *)$BUF + $OFF, sizeof($TYPE), $ARG3, $COUNT)
          - pattern: $CALL((uint8_t *)$BUF + $OFF, sizeof($TYPE), $ARG3, $COUNT)
          - pattern: $CALL((char *)($BUF + $OFF), sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL((unsigned char *)($BUF + $OFF), sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL((uint8_t *)($BUF + $OFF), sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL((void *)($BUF + $OFF), sizeof($BUF), $ARG3, $COUNT)
          - pattern: $CALL($BUF + $OFF, sizeof($BUF), $ARG3)
          - pattern: $CALL($BUF - $OFF, sizeof($BUF), $ARG3)
          - pattern: $CALL(($BUF + $OFF), sizeof($BUF), $ARG3)
          - pattern: $CALL(($BUF - $OFF), sizeof($BUF), $ARG3)
          - pattern: $CALL(&$BUF[$IDX], sizeof($BUF), $ARG3)
          - pattern: $CALL((&$BUF[$IDX]), sizeof($BUF), $ARG3)
          - pattern: $CALL(($CAST *)$BUF + $OFF, sizeof($TYPE), $ARG3)
          - pattern: $CALL((char *)$BUF + $OFF, sizeof($TYPE), $ARG3)
          - pattern: $CALL((unsigned char *)$BUF + $OFF, sizeof($TYPE), $ARG3)
          - pattern: $CALL((uint8_t *)$BUF + $OFF, sizeof($TYPE), $ARG3)
          - pattern: $CALL((char *)($BUF + $OFF), sizeof($BUF), $ARG3)
          - pattern: $CALL((unsigned char *)($BUF + $OFF), sizeof($BUF), $ARG3)
          - pattern: $CALL((uint8_t *)($BUF + $OFF), sizeof($BUF), $ARG3)
          - pattern: $CALL((void *)($BUF + $OFF), sizeof($BUF), $ARG3)
          - pattern: $CALL($BUF + $OFF, sizeof($BUF), ...)
          - pattern: $CALL($BUF - $OFF, sizeof($BUF), ...)
          - pattern: $CALL(($BUF + $OFF), sizeof($BUF), ...)
          - pattern: $CALL(($BUF - $OFF), sizeof($BUF), ...)
          - pattern: $CALL(&$BUF[$IDX], sizeof($BUF), ...)
          - pattern: $CALL((&$BUF[$IDX]), sizeof($BUF), ...)
          - pattern: $CALL(($CAST *)$BUF + $OFF, sizeof($TYPE), ...)
          - pattern: $CALL((char *)$BUF + $OFF, sizeof($TYPE), ...)
          - pattern: $CALL((unsigned char *)$BUF + $OFF, sizeof($TYPE), ...)
          - pattern: $CALL((uint8_t *)$BUF + $OFF, sizeof($TYPE), ...)
          - pattern: $CALL((char *)($BUF + $OFF), sizeof($BUF), ...)
          - pattern: $CALL((unsigned char *)($BUF + $OFF), sizeof($BUF), ...)
          - pattern: $CALL((uint8_t *)($BUF + $OFF), sizeof($BUF), ...)
          - pattern: $CALL((void *)($BUF + $OFF), sizeof($BUF), ...)
      - metavariable-regex:
          metavariable: $CALL
          regex: '^(memcpy_s|memmove_s|memset_s|memcpy_sp|memcpy_safe|VOS_memcpy_safe|VOS_MemCpy_S|VOS_Mem_Copy_Safe|VOS_MemCpy_Safe|strcpy_s|strcat_s|wcscpy_s|wcscat_s|strncpy_s|strncat_s|wcsncpy_s|wcsncat_s|strcpy_safe|strcat_safe|strncpy_safe|strncat_safe|VOS_StrCpy_S|VOS_StrCat_S|VOS_StrNCpy_S|VOS_StrNCat_S|VOS_StrCpy_Safe|VOS_StrCat_Safe|VOS_StrNCpy_Safe|VOS_StrNCat_Safe|sprintf_s|snprintf_s|vsprintf_s|vsnprintf_s)$'

  - id: c-cpp.safe-mem.member-offset-full-member-size
    languages: [c, cpp]
    severity: ERROR
    message: >
      Function=`$FUNC`. Safe memory call `$CALL` writes to an offset inside a member while dstsz still uses the full member size.
      The real remaining space is sizeof(member) minus the offset.
    metadata:
      category: security
      cwe:
        - "CWE-787: Out-of-bounds Write"
      risk_class: "B: member offset destination with full member dstsz"
    patterns:
      - pattern-either:
          - pattern-inside: |
              $RET $FUNC(...) {
                ...
              }
          - pattern-inside: |
              $RET $QUAL::$FUNC(...) {
                ...
              }
      - pattern-either:
          - pattern: $CALL($OBJ.$FIELD + $OFF, sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL(($OBJ.$FIELD + $OFF), sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL(&$OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL((&$OBJ.$FIELD[$IDX]), sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL($P->$FIELD + $OFF, sizeof($P->$FIELD), $ARG3, $COUNT)
          - pattern: $CALL(($P->$FIELD + $OFF), sizeof($P->$FIELD), $ARG3, $COUNT)
          - pattern: $CALL(&$P->$FIELD[$IDX], sizeof($P->$FIELD), $ARG3, $COUNT)
          - pattern: $CALL((&$P->$FIELD[$IDX]), sizeof($P->$FIELD), $ARG3, $COUNT)
          - pattern: $CALL((char *)($OBJ.$FIELD + $OFF), sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL((char *)($P->$FIELD + $OFF), sizeof($P->$FIELD), $ARG3, $COUNT)
          - pattern: $CALL($OBJ.$FIELD + $OFF, sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL(($OBJ.$FIELD + $OFF), sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL(&$OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL((&$OBJ.$FIELD[$IDX]), sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL($P->$FIELD + $OFF, sizeof($P->$FIELD), $ARG3)
          - pattern: $CALL(($P->$FIELD + $OFF), sizeof($P->$FIELD), $ARG3)
          - pattern: $CALL(&$P->$FIELD[$IDX], sizeof($P->$FIELD), $ARG3)
          - pattern: $CALL((&$P->$FIELD[$IDX]), sizeof($P->$FIELD), $ARG3)
          - pattern: $CALL((char *)($OBJ.$FIELD + $OFF), sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL((char *)($P->$FIELD + $OFF), sizeof($P->$FIELD), $ARG3)
          - pattern: $CALL($OBJ.$FIELD + $OFF, sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL(($OBJ.$FIELD + $OFF), sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL(&$OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL((&$OBJ.$FIELD[$IDX]), sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL($P->$FIELD + $OFF, sizeof($P->$FIELD), ...)
          - pattern: $CALL(($P->$FIELD + $OFF), sizeof($P->$FIELD), ...)
          - pattern: $CALL(&$P->$FIELD[$IDX], sizeof($P->$FIELD), ...)
          - pattern: $CALL((&$P->$FIELD[$IDX]), sizeof($P->$FIELD), ...)
          - pattern: $CALL((char *)($OBJ.$FIELD + $OFF), sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL((char *)($P->$FIELD + $OFF), sizeof($P->$FIELD), ...)
      - metavariable-regex:
          metavariable: $CALL
          regex: '^(memcpy_s|memmove_s|memset_s|memcpy_sp|memcpy_safe|VOS_memcpy_safe|VOS_MemCpy_S|VOS_Mem_Copy_Safe|VOS_MemCpy_Safe|strcpy_s|strcat_s|wcscpy_s|wcscat_s|strncpy_s|strncat_s|wcsncpy_s|wcsncat_s|strcpy_safe|strcat_safe|strncpy_safe|strncat_safe|VOS_StrCpy_S|VOS_StrCat_S|VOS_StrNCpy_S|VOS_StrNCat_S|VOS_StrCpy_Safe|VOS_StrCat_Safe|VOS_StrNCpy_Safe|VOS_StrNCat_Safe|sprintf_s|snprintf_s|vsprintf_s|vsnprintf_s)$'

  - id: c-cpp.safe-mem.pointer-sizeof-dst
    languages: [c, cpp]
    severity: WARNING
    message: >
      Function=`$FUNC`. Safe memory call `$CALL` uses sizeof(pointer) as dstsz.
      This usually gives the pointer width rather than the destination buffer capacity.
    metadata:
      category: security
      cwe:
        - "CWE-787: Out-of-bounds Write"
      risk_class: "C: sizeof pointer used as dstsz"
    patterns:
      - pattern-either:
          - pattern-inside: |
              $RET $FUNC(...) {
                ...
              }
          - pattern-inside: |
              $RET $QUAL::$FUNC(...) {
                ...
              }
      - pattern-either:
          - pattern-inside: |
              $TYPE *$PTR;
              ...
          - pattern-inside: |
              $TYPE *$PTR = $INIT;
              ...
          - pattern-inside: |
              $TYPE*$PTR;
              ...
          - pattern-inside: |
              $TYPE*$PTR = $INIT;
              ...
          - pattern-inside: |
              $RET $FUNC(..., $TYPE *$PTR, ...) {
                ...
              }
          - pattern-inside: |
              $RET $QUAL::$FUNC(..., $TYPE *$PTR, ...) {
                ...
              }
          - pattern-inside: |
              $RET $FUNC(..., $TYPE*$PTR, ...) {
                ...
              }
          - pattern-inside: |
              $RET $QUAL::$FUNC(..., $TYPE*$PTR, ...) {
                ...
              }
      - pattern-either:
          - pattern: $CALL($PTR, sizeof($PTR), $ARG3, $COUNT)
          - pattern: $CALL($PTR, sizeof($PTR), $ARG3)
          - pattern: $CALL($PTR, sizeof($PTR), ...)
      - metavariable-regex:
          metavariable: $CALL
          regex: '^(memcpy_s|memmove_s|memset_s|memcpy_sp|memcpy_safe|VOS_memcpy_safe|VOS_MemCpy_S|VOS_Mem_Copy_Safe|VOS_MemCpy_Safe|strcpy_s|strcat_s|wcscpy_s|wcscat_s|strncpy_s|strncat_s|wcsncpy_s|wcsncat_s|strcpy_safe|strcat_safe|strncpy_safe|strncat_safe|VOS_StrCpy_S|VOS_StrCat_S|VOS_StrNCpy_S|VOS_StrNCat_S|VOS_StrCpy_Safe|VOS_StrCat_Safe|VOS_StrNCpy_Safe|VOS_StrNCat_Safe|sprintf_s|snprintf_s|vsprintf_s|vsnprintf_s)$'

  - id: c-cpp.safe-mem.multidim-array-full-size
    languages: [c, cpp]
    severity: ERROR
    message: >
      Function=`$FUNC`. Safe memory call `$CALL` writes to an array row or subarray while dstsz uses the full outer array size.
      The destination appears smaller than the dstsz expression.
    metadata:
      category: security
      cwe:
        - "CWE-787: Out-of-bounds Write"
      risk_class: "B: subarray destination with full array dstsz"
    patterns:
      - pattern-either:
          - pattern-inside: |
              $RET $FUNC(...) {
                ...
              }
          - pattern-inside: |
              $RET $QUAL::$FUNC(...) {
                ...
              }
      - pattern-either:
          - pattern: $CALL($ARR[$IDX], sizeof($ARR), $ARG3, $COUNT)
          - pattern: $CALL(&$ARR[$IDX], sizeof($ARR), $ARG3, $COUNT)
          - pattern: $CALL($OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL(&$OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL($P->$FIELD[$IDX], sizeof($P->$FIELD), $ARG3, $COUNT)
          - pattern: $CALL(&$P->$FIELD[$IDX], sizeof($P->$FIELD), $ARG3, $COUNT)
          - pattern: $CALL($ARR[$ROW][$COL], sizeof($ARR), $ARG3, $COUNT)
          - pattern: $CALL(&$ARR[$ROW][$COL], sizeof($ARR), $ARG3, $COUNT)
          - pattern: $CALL($OBJ.$FIELD[$ROW][$COL], sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL(&$OBJ.$FIELD[$ROW][$COL], sizeof($OBJ.$FIELD), $ARG3, $COUNT)
          - pattern: $CALL($ARR[$IDX], sizeof($ARR), $ARG3)
          - pattern: $CALL(&$ARR[$IDX], sizeof($ARR), $ARG3)
          - pattern: $CALL($OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL(&$OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL($P->$FIELD[$IDX], sizeof($P->$FIELD), $ARG3)
          - pattern: $CALL(&$P->$FIELD[$IDX], sizeof($P->$FIELD), $ARG3)
          - pattern: $CALL($ARR[$ROW][$COL], sizeof($ARR), $ARG3)
          - pattern: $CALL(&$ARR[$ROW][$COL], sizeof($ARR), $ARG3)
          - pattern: $CALL($OBJ.$FIELD[$ROW][$COL], sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL(&$OBJ.$FIELD[$ROW][$COL], sizeof($OBJ.$FIELD), $ARG3)
          - pattern: $CALL($ARR[$IDX], sizeof($ARR), ...)
          - pattern: $CALL(&$ARR[$IDX], sizeof($ARR), ...)
          - pattern: $CALL($OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL(&$OBJ.$FIELD[$IDX], sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL($P->$FIELD[$IDX], sizeof($P->$FIELD), ...)
          - pattern: $CALL(&$P->$FIELD[$IDX], sizeof($P->$FIELD), ...)
          - pattern: $CALL($ARR[$ROW][$COL], sizeof($ARR), ...)
          - pattern: $CALL(&$ARR[$ROW][$COL], sizeof($ARR), ...)
          - pattern: $CALL($OBJ.$FIELD[$ROW][$COL], sizeof($OBJ.$FIELD), ...)
          - pattern: $CALL(&$OBJ.$FIELD[$ROW][$COL], sizeof($OBJ.$FIELD), ...)
      - metavariable-regex:
          metavariable: $CALL
          regex: '^(memcpy_s|memmove_s|memset_s|memcpy_sp|memcpy_safe|VOS_memcpy_safe|VOS_MemCpy_S|VOS_Mem_Copy_Safe|VOS_MemCpy_Safe|strcpy_s|strcat_s|wcscpy_s|wcscat_s|strncpy_s|strncat_s|wcsncpy_s|wcsncat_s|strcpy_safe|strcat_safe|strncpy_safe|strncat_safe|VOS_StrCpy_S|VOS_StrCat_S|VOS_StrNCpy_S|VOS_StrNCat_S|VOS_StrCpy_Safe|VOS_StrCat_Safe|VOS_StrNCpy_Safe|VOS_StrNCat_Safe|sprintf_s|snprintf_s|vsprintf_s|vsnprintf_s)$'
