# OpenDeepHole Agent Configuration
# Edit this file before running the agent.

# Web server URL（OpenDeepHole Web 服务地址）
server_url: "http://your-server:8000"

# Agent 显示名称（显示在新建扫描的下拉列表中），留空则使用主机名
agent_name: ""

# 用户归属 token（下载 Agent 时自动填入，勿手动修改）
owner_token: ""

# 代理跳过列表，逗号分隔，如 "localhost,127.0.0.1,10.0.0.0/8"
no_proxy: "10.0.0.0/8"

# 要运行的检查项，留空则运行全部已启用的检查项
# 可选值: npd, oob, uaf, intoverflow, memleak
checkers: []

# LLM API 配置（供 mode: api 的检查项使用）
# 各检查项的 mode 在其 checker.yaml 中独立配置
llm_api:
  base_url: "https://api.anthropic.com"   # OpenAI 兼容接口地址
  api_key: "your-api-key-here"
  model: "claude-sonnet-4-6"
  temperature: 0.1
  timeout: 300      # 单次调用超时（秒）
  max_retries: 3
  stream: false      # 是否使用流式传输（部分 API 仅支持流式）

# CLI 审计工具配置（供 mode: opencode 的检查项使用）
# tool 可选: nga, opencode, hac, claude
opencode:
  tool: "nga"
  executable: "nga"  # 可执行文件名或完整路径，Windows 示例："C:/tools/nga.cmd"
  model: ""               # 兼容字段：未配置 models 时使用；留空则使用 CLI 默认模型
  timeout: 1200            # 单次调用超时（秒）
  max_retries: 2           # 非超时错误重试次数
  # 可选：多模型池。未配置时使用上方 model，且所有 checker 都可使用。
  # models:
  #   - id: "fast"
  #     model: "fast-model"
  #     use_default_model: false
  #     capability: "low"      # low | medium | high
  #     weight: 3              # 权重越高，空闲时越优先分配
  #     max_concurrency: 2
  #     enabled: true
  #     time_windows:          # 可选，每日 Agent 本地时间；空数组表示全天可用
  #       - start: "09:00"
  #         end: "18:00"
  #   - id: "default"
  #     model: ""
  #     use_default_model: true # 不传 --model，使用 CLI 默认模型
  #     capability: "high"
  #     weight: 1
  #     max_concurrency: 1
  #     enabled: true
  models: []

# OpenCode/兼容 CLI 总并发数；配置 models 后也是所有模型合计运行数的硬上限。
# 实际并发同时受单模型 max_concurrency 和每日使用时间限制。
opencode_concurrency: 4

# 静态候选跨规则去重：同 family、同函数只保留一个代表候选。
static_dedup: true

# AI 审计同模式批量过滤：代表点被 AI 否决后，跳过同模式后续候选。
pattern_filter:
  enabled: true
  scope: "directory"  # directory | file | repo

# 漏洞验证脚本配置。脚本在 Agent 本机运行，脚本文件不会随远端 runtime/checker 同步。
vulnerability_validation:
  enabled: true
  script_path: ""      # 留空时使用 ~/.opendeephole/vulnerability_validation/validator.py
  command: ""          # 可选自定义命令；会追加 --report <file> --output <file>
  timeout_seconds: 7200

# AI 去误报 CLI 配置（可选）
# 删除或设为 null 时，默认继承上面的 opencode 工具和模型配置。
# fp_review_cli:
#   tool: "claude"
#   executable: "claude"
#   model: ""       # 兼容字段：未配置 models 时使用
#   timeout: 1200
#   max_retries: 2
#   models: []

# Git 历史安全问题挖掘配置
# 默认关闭。设为 true 时会分析 git 提交历史，挖掘历史安全问题模式，并对每条模式做全仓同类变体排查；
# 去误报阶段据此做「历史/校验匹配」直接定级。
git_history:
  enabled: false       # 是否启用（非 git 仓库会自动跳过）
  max_commits: 200     # 最多分析最近 N 条提交
  since: ""            # git log --since 过滤，如 "6 months ago"（留空不限）
  paths: ""            # git log 路径过滤，空格分隔（留空不限）
  variant_hunt: true   # 是否对每条历史问题模式做全仓同类变体排查
