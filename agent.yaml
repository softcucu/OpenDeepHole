# OpenDeepHole Agent Configuration
# Edit this file before running the agent.

# Web server URL（OpenDeepHole Web 服务地址）
server_url: "http://your-server:8000"

# Agent 显示名称（显示在新建扫描的下拉列表中），留空则使用主机名
agent_name: ""

# 用户归属 token（下载 Agent 时自动填入，勿手动修改）
owner_token: ""

# 代理跳过列表，逗号分隔，如 "localhost,127.0.0.1,10.0.0.0/8"
no_proxy: "10.0.0.0/8"

# 要运行的检查项，留空则运行全部已启用的检查项
# 可选值: npd, oob, uaf, intoverflow, memleak
checkers: []

# LLM API 配置（供 mode: api 的检查项使用）
# 各检查项的 mode 在其 checker.yaml 中独立配置
llm_api:
  base_url: "https://api.anthropic.com"   # OpenAI 兼容接口地址
  api_key: "your-api-key-here"
  model: "claude-sonnet-4-6"
  temperature: 0.1
  timeout: 300      # 单次调用超时（秒）
  max_retries: 3
  stream: false      # 是否使用流式传输（部分 API 仅支持流式）

# CLI 审计工具配置（供 mode: opencode 的检查项使用）
# tool 可选: nga, opencode, hac, claude
opencode:
  tool: "nga"
  executable: "nga"  # 可执行文件名或完整路径，Windows 示例："C:/tools/nga.cmd"
  model: ""               # 留空则使用 opencode 默认模型
  timeout: 1200            # 单次调用超时（秒）
  max_retries: 2           # 非超时错误重试次数

# AI 去误报 CLI 配置（可选）
# 删除或设为 null 时，默认继承上面的 opencode 工具和模型配置。
# fp_review_cli:
#   tool: "claude"
#   executable: "claude"
#   model: ""
#   timeout: 1200
#   max_retries: 2
