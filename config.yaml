# OpenDeepHole Configuration

no_proxy: "10.0.0.0/8"  # 逗号分隔的不走代理地址，如 "localhost,127.0.0.1,10.0.0.0/8"

opencode_concurrency: 4  # OpenCode serve 全局并发数

static_dedup: true  # 静态候选跨规则去重：同 family、同函数只保留一个代表候选

pattern_filter:
  enabled: true     # AI 否决代表点后，自动过滤同模式后续候选
  scope: "directory"  # directory | file | repo

vulnerability_validation:
  enabled: true     # 验证方法目录随任务前的 Agent runtime 更新强制同步
  timeout_seconds: 7200

server:
  host: "0.0.0.0"
  port: 8000

mcp_server:
  host: "0.0.0.0"
  port: 8100

opencode:
  executable: "opencode"  # opencode 可执行文件名或完整路径，如 "myopencode" 或 "C:/tools/opencode.cmd"
  model: ""       # 已废弃兼容字段；模型调度只读取 models
  timeout: 1200  # seconds per candidate analysis
  max_retries: 2  # retry on transient errors (not timeout)
  mock: false    # set to false when opencode is configured
  proxy_url: ""  # optional proxy for opencode/nga child processes, e.g. "http://127.0.0.1:3131"
  no_proxy: ""   # optional no_proxy for opencode/nga child processes; empty uses intranet defaults
  config_paths: [] # optional OpenCode config files to merge; OPENCODE_CONFIG_PATH is also supported
  config_jsonc: "{}" # Web-managed complete JSONC layer; OpenDeepHole reserved fields override it
  models: []     # 空池/全禁用会让任务阻塞排队；默认模型也需显式配置 use_default_model: true

fp_review:
  auto_on_complete: true  # 扫描完成且存在已确认漏洞时，自动触发去误报（无需手动点击）

git_history:
  enabled: false       # 默认关闭；设为 true 时分析 git 历史，挖掘历史安全问题模式并做同类变体排查
  max_commits: 200     # 最多分析最近 N 条提交
  since: ""            # git log --since 过滤，如 "6 months ago"（留空不限）
  paths: ""            # git log 路径过滤，空格分隔（留空不限）
  variant_hunt: true   # 是否对每条历史问题模式做全仓同类变体排查

threat_analysis:
  enabled: true  # 是否运行威胁分析阶段

storage:
  projects_dir: "../OpenDeepHoleData/projects"
  scans_dir: "../OpenDeepHoleData/scans"
  max_upload_size_mb: 2048

logging:
  level: "DEBUG"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/opendeephole.log"
  max_size_mb: 10      # max size per log file in MB
  backup_count: 5      # number of rotated log files to keep

auth:
  secret_key: ""                  # JWT 签名密钥，留空则自动生成（重启后旧 token 失效）
  token_expire_hours: 24          # JWT 过期时间（小时）
  default_admin_username: "admin" # 首次启动时创建的管理员用户名
  default_admin_password: "admin123"  # 首次启动时创建的管理员密码（请修改）
